# EIGSEP private LAN DHCP config — installed at /etc/dhcp/dhcpd.conf by
# the image build. Only the Pi with `dhcp = true` in
# /boot/firmware/eigsep-role.conf enables isc-dhcp-server.service, so
# this file is inert on every other Pi.
#
# Authority: this repo (image/pi-gen-config/stage-eigsep/files/dhcp/).
#
# Conventional addresses on 10.10.10.0/24:
#   10.10.10.10  — ground (dhcp-master) Pi. Static on the Pi side, NOT
#                  a DHCP reservation. Collaborators reach the system
#                  here; this is the published address.
#   10.10.10.11  — panda Pi (DHCP reservation by MAC, see below).
#   10.10.10.12  — active SNAP board (either of two physical units;
#                  spare-only, never powered simultaneously, so both
#                  MACs reserve to the same address).
#   10.10.10.17  — operator laptop. Static on the laptop side, NOT a
#                  DHCP reservation (so any laptop swap-in lands here
#                  by following docs/operator/laptop.md).
# Dynamic pool (.20–.255) covers anything else that wants a lease.

option domain-name "eigsep.local";

default-lease-time 600;
max-lease-time 7200;

ddns-update-style none;

subnet 10.10.10.0 netmask 255.255.255.0 {
  interface eth0;
  range 10.10.10.20 10.10.10.255;
  option routers 10.10.10.10;
}

# panda Pi. TODO: fill in MAC and uncomment when the panda Pi is
# sourced. Workflow: docs/operator/new-pi.md (capture MAC from
# journalctl -u isc-dhcp-server, open a PR with the reservation).
#host panda {
#  hardware ethernet XX:XX:XX:XX:XX:XX;
#  fixed-address 10.10.10.11;
#}

# Physical SNAP boards, spare-only — never powered at the same time, so
# every MAC reserves to .12 (corr_config.yaml stays single-IP). Add a
# new host{} block here when a new SNAP joins the rotation; the existing
# ones can stay even if the corresponding board is not currently wired.
host snap1 {
  hardware ethernet 00:08:cf:3d:13:03;
  fixed-address 10.10.10.12;
}

host snap2 {
  hardware ethernet 00:35:56:0e:17:01;
  fixed-address 10.10.10.12;
}

host snapC000069 {
  hardware ethernet 00:10:b5:22:17:01;
  fixed-address 10.10.10.12;
}
