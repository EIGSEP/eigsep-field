# backend Pi (10.10.10.10): serves NTP to 10.10.10.0/24.
# Upstream is the operator laptop at 10.10.10.17 (statically configured
# on the laptop side per docs/operator/laptop.md). When the laptop is
# absent or not running an NTP server, `local stratum 10` keeps us
# serving the LAN clients off our last estimate so the cluster stays
# mutually agreed even without a true upstream.
server 10.10.10.17 iburst minpoll 4 maxpoll 6
allow 10.10.10.0/24
local stratum 10
makestep 1.0 3
rtcsync
