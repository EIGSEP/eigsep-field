# EIGSEP role snippet: stock Redis persistence.
#
# Symlinked to /etc/redis/redis.conf.d/eigsep-role.conf at image build
# time (the pre-role default) and by `eigsep-field _apply-role` on
# every role except backend. It deliberately sets nothing — the Debian
# defaults (RDB save points + save-on-shutdown) are the point.
#
# The panda Pi's Redis is the system of record for one-shot operator
# state that no producer republishes on reboot: `pico_config` (the
# flash-picos device registry — lost means PicoManager falls back to
# reflashing the whole pico fleet on every cold boot) and
# `pot_calibration` (the calibrate-pot voltage→angle cal — lost means
# potmon publishes None angles until a human re-runs the interactive
# sweep). Stock persistence keeps those keys across reboots. The
# bgsave-fork stall that motivates ephemeral.conf doesn't bite here:
# the correlator read loop runs on the backend Pi.
