# EIGSEP role snippet: ephemeral Redis (no on-disk persistence).
#
# Symlinked to /etc/redis/redis.conf.d/eigsep-role.conf by
# `eigsep-field _apply-role` on the backend (SNAP/correlator) Pi only.
#
# The backend's Redis is a live message bus, not a system of record:
# corr + metadata ride MAXLEN-capped streams, the K/V provenance keys
# (corr header, run_tag, snap_reinit, file_heartbeat) are republished
# by their producers on startup and on every state change, and corr
# data is persisted to HDF5 by eigsep-observe. An RDB snapshot
# therefore buys nothing — but the bgsave fork on a RAM-limited Pi is
# a periodic multi-100ms stall, and with redis-server and
# eigsep-fpga-init co-located that stall surfaces as dropped
# correlator integrations: the read loop must finish each ~144 KB
# readout before the FPGA overwrites the live BRAM (no vacc
# double-buffer), so a fork pause inside the integration window drops
# that integration. Stock Debian ships RDB save points enabled; empty
# `save` disables RDB, `appendonly no` disables AOF.
#
# Do NOT apply this on the panda Pi — its Redis holds one-shot
# operator state that nothing republishes; see persistent.conf.
save ""
appendonly no
