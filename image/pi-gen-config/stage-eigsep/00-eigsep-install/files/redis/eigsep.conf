# EIGSEP field Redis overrides.
#
# Installed at /etc/redis/redis.conf.d/eigsep.conf by the image build
# (image/pi-gen-config/stage-eigsep/00-run.sh) and pulled in by an
# `include` line appended to /etc/redis/redis.conf. Redis applies the
# last directive wins, so settings here override the package defaults.
#
# The writer (eigsep-observe) connects to two Redis instances on the
# private LAN: the panda Pi and the SNAP/correlator Pi. Stock Debian
# bookworm binds Redis to loopback only, which breaks every cross-Pi
# read and also blocks an operator laptop plugged into the field switch
# from running a live plotter or a parallel writer. Allowing all
# interfaces is safe in this deployment because the field LAN
# (10.10.10.0/24) is physically isolated — no internet uplink, no
# routable path from outside the box.

bind 0.0.0.0 -::
protected-mode no

# Disable on-disk persistence. These Redis instances are a live message
# bus, not a system of record: corr + metadata ride MAXLEN-capped
# streams, the K/V provenance keys are republished by their producers,
# and corr data is persisted to HDF5 by eigsep-observe. An RDB snapshot
# therefore buys nothing — but the bgsave fork on a RAM-limited Pi is a
# periodic multi-100ms stall, and on the SNAP/correlator Pi (redis +
# eigsep-fpga-init co-located) that stall surfaces as dropped correlator
# integrations: the read loop must finish each ~144 KB readout before
# the FPGA overwrites the live BRAM (no vacc double-buffer), so a fork
# pause inside the integration window drops that integration. Stock
# Debian ships RDB save points enabled; empty `save` disables RDB,
# `appendonly no` disables AOF.
#
# Tradeoff: a redis-only restart (not a full reboot) drops in-memory K/V
# state. In practice producers republish on their own startup and on
# every state change (corr header on initialize/synchronize/set_*;
# obs_config on panda start; run_tag / snap_reinit / file_heartbeat on
# their next emit), and a full Pi reboot restarts them anyway, so the
# bus refills without operator action.
save ""
appendonly no
