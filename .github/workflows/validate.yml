name: validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: python -m pip install ruff
      - run: ruff check .
      - run: ruff format --check .

  manifest:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Verify manifest versions exist upstream
        env:
          GH_TOKEN: ${{ github.token }}
        run: python3 scripts/verify_manifest.py manifest.toml

  lock-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@v4
      - name: uv lock must be in sync
        run: uv lock --locked
      - name: requirements.txt must match uv export
        # Regenerate in place and let git detect drift. Writing to a
        # different path won't work: `uv export` records the output
        # filename in the file's autogenerated header, so a diff against
        # /tmp/req.txt always shows that one comment line as different.
        run: |
          uv export --format requirements-txt --no-hashes \
              --output-file requirements.txt
          git diff --exit-code requirements.txt

  smoke:
    runs-on: ubuntu-latest
    needs: [manifest]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install from source (pulls blessed deps from PyPI)
        run: |
          python -m pip install --upgrade pip
          python -m pip install .
      - name: Import every blessed package
        run: |
          python -c "import eigsep_redis, picohost, eigsep_observing, pyvalon; print('imports ok')"
          python -c "import cmt_vna" || python -c "import eigsep_vna" || true
      - name: CLI info
        run: eigsep-field info
      - name: Service unit CLI flag tripwire
        # Each blessed sibling CLI is now on PATH (pip install . above);
        # assert every long flag in a service unit's ExecStart is
        # recognized by the binary's argparse. Guards against the
        # picohost-v3.1.1-style regression where a unit ships an argv
        # flag the CLI no longer accepts. pytest-timeout is required
        # because pyproject.toml's addopts passes --timeout=60.
        run: |
          python -m pip install pytest pytest-timeout
          pytest -q tests/test_service_cli_flags.py

  contract:
    # Install the blessed eigsep_observing at its manifest version and run
    # its shipped contract-test suite against the pinned stack. No repo
    # clone needed: the suite lives inside the wheel at
    # eigsep_observing.contract_tests.
    runs-on: ubuntu-latest
    needs: [manifest]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Read manifest
        id: m
        run: |
          python3 - <<'EOF' >> "$GITHUB_OUTPUT"
          import tomllib
          m = tomllib.load(open("manifest.toml", "rb"))
          print(f"obs_version={m['packages']['eigsep_observing']['version']}")
          EOF
      - name: Install stack pinned to manifest
        run: |
          python -m pip install --upgrade pip
          python -m pip install .
          python -m pip install "eigsep_observing[dev]==${{ steps.m.outputs.obs_version }}"
      - name: Run contract tests
        run: pytest -q --pyargs eigsep_observing.contract_tests

  docs-drift:
    # Interface docs (docs/interface/*.md) carry generated tables derived
    # from eigsep_redis.keys, eigsep_observing.keys, and
    # eigsep_observing.io.SENSOR_SCHEMAS. This job installs the blessed
    # sibling versions, regenerates, and fails if anything drifted.
    runs-on: ubuntu-latest
    needs: [manifest]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Read manifest
        id: m
        run: |
          python3 - <<'EOF' >> "$GITHUB_OUTPUT"
          import tomllib
          m = tomllib.load(open("manifest.toml", "rb"))
          print(f"redis_version={m['packages']['eigsep_redis']['version']}")
          print(f"obs_version={m['packages']['eigsep_observing']['version']}")
          EOF
      - name: Install blessed sibling versions + test deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install .[dev]
          python -m pip install \
              "eigsep_redis==${{ steps.m.outputs.redis_version }}" \
              "eigsep_observing[dev]==${{ steps.m.outputs.obs_version }}"
      - name: Regenerate interface docs
        run: python3 scripts/gen_interface_docs.py
      - name: Fail if docs drifted
        run: git diff --exit-code docs/interface/
      - name: pytest interface drift test (belt and suspenders)
        run: pytest -q tests/test_interface_docs.py

  field-smoke:
    # End-to-end exercise of the offline patch/revert workflow against a
    # throwaway venv + slim wheelhouse. Catches regressions in the
    # patch/revert path that unit tests can't: uv flag changes, --no-deps
    # semantics, manifest -> sibling clone wiring. Runs on x86_64 GHA
    # (the production wheelhouse is aarch64 and built separately by
    # wheelhouse.yml); this job tests the *logic*, not the cross-build.
    runs-on: ubuntu-latest
    needs: [manifest]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@v4
      - name: Run simulate-field-pi.sh
        run: ./scripts/simulate-field-pi.sh

  services-drift:
    # Each [services.*] entry with kind="sibling" in manifest.toml pins a
    # unit file from a sibling repo at a specific tag. This job fetches
    # that upstream unit via `gh api` (so private sibling repos work),
    # compares semantic fields (After/Wants/Requires/Before in [Unit],
    # User/Group/Restart/Type + ExecStart argv[0] basename in [Service])
    # against our local copy under files/systemd/, and fails on drift.
    # Path-shaped differences (venv location, WorkingDirectory) and
    # [Install] WantedBy (rewritten to the image's role targets) are
    # intentionally allowed.
    runs-on: ubuntu-latest
    needs: [manifest]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Check sibling unit files against pinned upstream
        env:
          GH_TOKEN: ${{ github.token }}
        run: python3 scripts/check_services_drift.py
      - name: pytest services drift test (belt and suspenders)
        env:
          GH_TOKEN: ${{ github.token }}
        # pytest-timeout is required because pyproject.toml's
        # [tool.pytest.ini_options] passes --timeout=60 in addopts.
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest pytest-timeout
          pytest -q tests/test_services_drift.py
