name: image

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    # Native arm64 runner: pi-gen's debootstrap/chroot run without qemu,
    # avoiding the binfmt_misc fix-binary fight and the ~5x emulation
    # slowdown. Free for public repos as of 2025-01.
    runs-on: ubuntu-24.04-arm
    needs: []
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install prerequisites
        # qemu-user-binfmt is required by pi-gen's `depends` file even on
        # native arm64. It is not exercised at runtime here (no chroot
        # emulation needed) but pi-gen's startup check refuses to proceed
        # without it.
        run: |
          sudo apt-get update
          sudo apt-get install -y \
              quilt parted arch-test debootstrap zerofree \
              zip dosfstools libarchive-tools libcap2-bin grep \
              rsync xz-utils file git curl bc qemu-utils kpartx \
              qemu-user-binfmt
      - name: Wait for wheelhouse run, then download asset
        # Poll the wheelhouse run for this tag's commit so we fail fast if
        # it failed, rather than blind-polling 15 min for an asset that
        # will never appear.
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          SHA="${GITHUB_SHA}"
          status=
          conclusion=
          for i in {1..30}; do
              line=$(gh run list \
                  --workflow=wheelhouse.yml --commit="$SHA" --limit 1 \
                  --json status,conclusion \
                  --jq 'if length == 0 then "missing|" else .[0] | "\(.status)|\(.conclusion // "")" end')
              status="${line%%|*}"
              conclusion="${line##*|}"
              echo "wheelhouse: status='$status' conclusion='$conclusion' (attempt $i/30)"
              if [ "$status" = "completed" ]; then
                  if [ "$conclusion" = "success" ]; then
                      break
                  fi
                  echo "::error::wheelhouse concluded '$conclusion'; aborting image build"
                  exit 1
              fi
              sleep 30
          done
          if [ "$status" != "completed" ] || [ "$conclusion" != "success" ]; then
              echo "::error::Timed out waiting for wheelhouse to complete"
              exit 1
          fi
          mkdir -p image/pi-gen-config/stage-eigsep/files/wheels
          gh release download "$TAG" --pattern 'wheels-*.tar.xz' \
              --dir /tmp/wheels
          tar -C image/pi-gen-config/stage-eigsep/files/wheels \
              -xJf /tmp/wheels/wheels-linux_aarch64.tar.xz
      - name: Pull firmware blobs referenced in manifest
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 scripts/fetch_firmware.py manifest.toml \
              image/pi-gen-config/stage-eigsep/files/firmware
      - name: Clone pi-gen
        run: git clone --depth=1 --branch arm64 https://github.com/RPi-Distro/pi-gen.git /tmp/pi-gen
      - name: Layer stage-eigsep into pi-gen
        env:
          # The `eigsep` user's login password. Stored as a repo secret so it
          # isn't checked in. Rotate via the repo's Actions secrets settings.
          # Required: an unset secret would let pi-gen fall back to the public
          # default "raspberry", which is never acceptable for a Release-
          # published image — see image/README.md.
          FIRST_USER_PASS: ${{ secrets.IMAGE_FIRST_USER_PASS }}
        run: |
          if [ -z "${FIRST_USER_PASS:-}" ]; then
              echo "::error::IMAGE_FIRST_USER_PASS secret is not set."
              echo "Set it at https://github.com/${GITHUB_REPOSITORY}/settings/secrets/actions" \
                  "before re-running. The image must not ship with pi-gen's" \
                  "default 'raspberry' password." >&2
              exit 1
          fi
          case "${FIRST_USER_PASS}" in
              *$'\n'*|*$'\r'*)
                  echo "::error::IMAGE_FIRST_USER_PASS must not contain newline or carriage return characters." >&2
                  exit 1
                  ;;
          esac
          cp -r image/pi-gen-config/stage-eigsep /tmp/pi-gen/stage-eigsep
          cp image/pi-gen-config/config /tmp/pi-gen/config
          # pi-gen sources `config` as shell. Quote with shlex so a password
          # containing spaces/quotes/`$` survives intact. Reject embedded
          # newlines/CR first so the assignment stays single-line. Prepend
          # rather than append so the assignment lands ahead of the `:?`
          # safety assertion in `config`, which would otherwise fire on the
          # still-unset variable when pi-gen sources the file top-to-bottom.
          python3 - <<'PY'
          import os, shlex
          path = '/tmp/pi-gen/config'
          with open(path) as f:
              existing = f.read()
          with open(path, 'w') as f:
              f.write(f"FIRST_USER_PASS={shlex.quote(os.environ['FIRST_USER_PASS'])}\n")
              f.write(existing)
          PY
      - name: Build image
        working-directory: /tmp/pi-gen
        run: sudo ./build.sh
      - name: Collect artifacts
        run: |
          mkdir -p out
          cp /tmp/pi-gen/deploy/*.img out/ || true
          cp /tmp/pi-gen/deploy/*.img.xz out/ || true
          cd out
          for f in *.img.xz; do
              split -b 1800M "$f" "${f}.part."
              sha256sum "$f" > "${f}.sha256"
              sha256sum "${f}.part."* >> "${f}.sha256"
          done
      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release upload "$TAG" out/*.part.* out/*.sha256 --clobber
