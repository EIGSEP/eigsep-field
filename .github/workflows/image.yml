name: image

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    # Native arm64 runner: pi-gen's debootstrap/chroot run without qemu,
    # avoiding the binfmt_misc fix-binary fight and the ~5x emulation
    # slowdown. Free for public repos as of 2025-01.
    runs-on: ubuntu-24.04-arm
    needs: []
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install prerequisites
        # qemu-user-binfmt is required by pi-gen's `depends` file even on
        # native arm64. It is not exercised at runtime here (no chroot
        # emulation needed) but pi-gen's startup check refuses to proceed
        # without it.
        run: |
          sudo apt-get update
          sudo apt-get install -y \
              quilt parted arch-test debootstrap zerofree \
              zip dosfstools libarchive-tools libcap2-bin grep \
              rsync xz-utils file git curl bc qemu-utils kpartx \
              qemu-user-binfmt
      - name: Wait for wheelhouse run, then download asset
        # Poll the wheelhouse run for this tag's commit so we fail fast if
        # it failed, rather than blind-polling 15 min for an asset that
        # will never appear.
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          SHA="${GITHUB_SHA}"
          status=
          conclusion=
          for i in {1..30}; do
              line=$(gh run list \
                  --workflow=wheelhouse.yml --commit="$SHA" --limit 1 \
                  --json status,conclusion \
                  --jq 'if length == 0 then "missing|" else .[0] | "\(.status)|\(.conclusion // "")" end')
              status="${line%%|*}"
              conclusion="${line##*|}"
              echo "wheelhouse: status='$status' conclusion='$conclusion' (attempt $i/30)"
              if [ "$status" = "completed" ]; then
                  if [ "$conclusion" = "success" ]; then
                      break
                  fi
                  echo "::error::wheelhouse concluded '$conclusion'; aborting image build"
                  exit 1
              fi
              sleep 30
          done
          if [ "$status" != "completed" ] || [ "$conclusion" != "success" ]; then
              echo "::error::Timed out waiting for wheelhouse to complete"
              exit 1
          fi
          mkdir -p image/pi-gen-config/stage-eigsep/00-eigsep-install/files/wheels
          gh release download "$TAG" --pattern 'wheels-*.tar.xz' \
              --dir /tmp/wheels
          tar -C image/pi-gen-config/stage-eigsep/00-eigsep-install/files/wheels \
              -xJf /tmp/wheels/wheels-linux_aarch64.tar.xz
      - name: Pull firmware blobs referenced in manifest
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 scripts/fetch_firmware.py manifest.toml \
              image/pi-gen-config/stage-eigsep/00-eigsep-install/files/firmware
      - name: Stage manifest.toml for stage-eigsep
        # 00-run.sh installs this to /etc/eigsep/manifest.toml in the
        # rootfs and reads its [release] field for the motd/cheatsheet
        # substitution. Pi-gen never sees the repo root, so copy it into
        # the sub-stage's files/ tree where the install script expects it.
        run: |
          install -d image/pi-gen-config/stage-eigsep/00-eigsep-install/files/etc-eigsep
          install -m 0644 manifest.toml \
              image/pi-gen-config/stage-eigsep/00-eigsep-install/files/etc-eigsep/manifest.toml
      - name: Clone pi-gen
        run: git clone --depth=1 --branch arm64 https://github.com/RPi-Distro/pi-gen.git /tmp/pi-gen
      - name: Layer stage-eigsep into pi-gen
        env:
          # The `eigsep` user's login password. Stored as a repo secret so it
          # isn't checked in. Rotate via the repo's Actions secrets settings.
          # Required: an unset secret would let pi-gen fall back to the public
          # default "raspberry", which is never acceptable for a Release-
          # published image — see image/README.md.
          FIRST_USER_PASS: ${{ secrets.IMAGE_FIRST_USER_PASS }}
        run: |
          if [ -z "${FIRST_USER_PASS:-}" ]; then
              echo "::error::IMAGE_FIRST_USER_PASS secret is not set."
              echo "Set it at https://github.com/${GITHUB_REPOSITORY}/settings/secrets/actions" \
                  "before re-running. The image must not ship with pi-gen's" \
                  "default 'raspberry' password." >&2
              exit 1
          fi
          case "${FIRST_USER_PASS}" in
              *$'\n'*|*$'\r'*)
                  echo "::error::IMAGE_FIRST_USER_PASS must not contain newline or carriage return characters." >&2
                  exit 1
                  ;;
          esac
          cp -r image/pi-gen-config/stage-eigsep /tmp/pi-gen/stage-eigsep
          cp image/pi-gen-config/config /tmp/pi-gen/config
          # Suppress stage2's deploy export so pi-gen only emits the
          # stage-eigsep image. Without this we'd get two .img.xz artifacts
          # in /tmp/pi-gen/deploy/ (the stock "lite" one and ours), and
          # whichever sorted first would be flashed by operators. Pi-gen's
          # SKIP_IMAGES marker turns off the export-image hook for that stage.
          touch /tmp/pi-gen/stage2/SKIP_IMAGES
          # pi-gen sources `config` as shell. Quote with shlex so a password
          # containing spaces/quotes/`$` survives intact. Reject embedded
          # newlines/CR first so the assignment stays single-line. Prepend
          # rather than append so the assignment lands ahead of the `:?`
          # safety assertion in `config`, which would otherwise fire on the
          # still-unset variable when pi-gen sources the file top-to-bottom.
          python3 - <<'PY'
          import os, shlex
          path = '/tmp/pi-gen/config'
          with open(path) as f:
              existing = f.read()
          with open(path, 'w') as f:
              f.write(f"FIRST_USER_PASS={shlex.quote(os.environ['FIRST_USER_PASS'])}\n")
              f.write(existing)
          PY
      - name: Build image
        working-directory: /tmp/pi-gen
        run: sudo ./build.sh
      - name: Verify stage-eigsep landed in deploy
        # Catch the regression class where stage-eigsep runs but its
        # output is silently discarded (missing EXPORT_IMAGE marker, or
        # stage2's deploy not suppressed). Pi-gen returns 0 in that case
        # and ships a stock Debian Lite image. Inspect the rootfs that
        # would be exported and assert the eigsep-stage artifacts are
        # present; also assert exactly one .img.xz with no "-lite" suffix
        # made it to deploy/.
        run: |
          ROOTFS=/tmp/pi-gen/work/eigsep-field/stage-eigsep/rootfs
          for path in \
              /etc/eigsep/manifest.toml \
              /opt/eigsep/venv/bin/eigsep-field \
              /usr/local/bin/eigsep-field; do
              if ! sudo test -e "$ROOTFS$path"; then
                  echo "::error::stage-eigsep rootfs is missing $path"
                  exit 1
              fi
          done
          shopt -s nullglob
          imgs=( /tmp/pi-gen/deploy/*.img.xz )
          if [ ${#imgs[@]} -ne 1 ]; then
              echo "::error::Expected exactly 1 .img.xz in deploy/, got ${#imgs[@]}"
              printf '  %s\n' "${imgs[@]}"
              exit 1
          fi
          if [[ "${imgs[0]}" == *-lite.img.xz ]]; then
              echo "::error::Deploy artifact has -lite suffix (${imgs[0]##*/});"
              echo "::error::stage-eigsep EXPORT_IMAGE missing or stage2 SKIP_IMAGES not set."
              exit 1
          fi
      - name: Collect artifacts
        run: |
          mkdir -p out
          cp /tmp/pi-gen/deploy/*.img.xz out/
          cd out
          for f in *.img.xz; do
              split -b 1800M "$f" "${f}.part."
              sha256sum "$f" > "${f}.sha256"
              sha256sum "${f}.part."* >> "${f}.sha256"
          done
      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release upload "$TAG" out/*.part.* out/*.sha256 --clobber
