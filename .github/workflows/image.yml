name: image

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    needs: []
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y \
              quilt parted qemu-user-static debootstrap zerofree \
              zip dosfstools libarchive-tools libcap2-bin grep \
              rsync xz-utils file git curl bc qemu-utils kpartx
      - name: Wait for wheelhouse asset, then download
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          for i in {1..30}; do
              if gh release view "$TAG" --repo "${GITHUB_REPOSITORY}" \
                  --json assets --jq '.assets[].name' \
                  | grep -q wheels-linux_aarch64.tar.xz; then
                  break
              fi
              sleep 30
          done
          mkdir -p image/pi-gen-config/stage-eigsep/files/wheels
          gh release download "$TAG" --pattern 'wheels-*.tar.xz' \
              --dir /tmp/wheels
          tar -C image/pi-gen-config/stage-eigsep/files/wheels \
              -xJf /tmp/wheels/wheels-linux_aarch64.tar.xz
      - name: Pull firmware blobs referenced in manifest
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 scripts/fetch_firmware.py manifest.toml \
              image/pi-gen-config/stage-eigsep/files/firmware
      - name: Clone pi-gen
        run: git clone --depth=1 --branch arm64 https://github.com/RPi-Distro/pi-gen.git /tmp/pi-gen
      - name: Layer stage-eigsep into pi-gen
        env:
          # The `eigsep` user's login password. Stored as a repo secret so it
          # isn't checked in. Rotate via the repo's Actions secrets settings.
          # Required: an unset secret would let pi-gen fall back to the public
          # default "raspberry", which is never acceptable for a Release-
          # published image — see image/README.md.
          FIRST_USER_PASS: ${{ secrets.IMAGE_FIRST_USER_PASS }}
        run: |
          if [ -z "${FIRST_USER_PASS:-}" ]; then
              echo "::error::IMAGE_FIRST_USER_PASS secret is not set."
              echo "Set it at https://github.com/${GITHUB_REPOSITORY}/settings/secrets/actions" \
                  "before re-running. The image must not ship with pi-gen's" \
                  "default 'raspberry' password." >&2
              exit 1
          fi
          cp -r image/pi-gen-config/stage-eigsep /tmp/pi-gen/stage-eigsep
          cp image/pi-gen-config/config /tmp/pi-gen/config
          # pi-gen sources `config` as shell. Quote with shlex so a password
          # containing spaces/quotes/`$` survives intact.
          python3 -c 'import os, shlex; print(f"FIRST_USER_PASS={shlex.quote(os.environ[\"FIRST_USER_PASS\"])}")' \
              >> /tmp/pi-gen/config
      - name: Build image
        working-directory: /tmp/pi-gen
        run: sudo ./build.sh
      - name: Collect artifacts
        run: |
          mkdir -p out
          cp /tmp/pi-gen/deploy/*.img out/ || true
          cp /tmp/pi-gen/deploy/*.img.xz out/ || true
          cd out
          for f in *.img.xz; do
              split -b 1800M "$f" "${f}.part."
              sha256sum "$f" > "${f}.sha256"
              sha256sum "${f}.part."* >> "${f}.sha256"
          done
      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release upload "$TAG" out/*.part.* out/*.sha256 --clobber
