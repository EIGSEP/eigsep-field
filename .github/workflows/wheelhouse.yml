name: wheelhouse

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        platform: [linux_aarch64]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v4
      - uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64,arm
      - name: Build wheelhouse (${{ matrix.platform }})
        run: ./scripts/build-wheelhouse.sh manifest.toml wheels ${{ matrix.platform }}
      - name: Tar wheelhouse
        run: tar -C wheels -cJf wheels-${{ matrix.platform }}.tar.xz .
      - name: Checksum
        run: sha256sum wheels-${{ matrix.platform }}.tar.xz > wheels-${{ matrix.platform }}.tar.xz.sha256
      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${GITHUB_REF#refs/tags/}" \
              wheels-${{ matrix.platform }}.tar.xz \
              wheels-${{ matrix.platform }}.tar.xz.sha256 \
              --clobber
      - name: Archive as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.platform }}
          path: |
            wheels-${{ matrix.platform }}.tar.xz
            wheels-${{ matrix.platform }}.tar.xz.sha256
