name: wheelhouse

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        platform: [linux_aarch64]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@v8.1.0
      - uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64,arm
      - name: Build wheelhouse (${{ matrix.platform }})
        run: ./scripts/build-wheelhouse.sh manifest.toml wheels ${{ matrix.platform }}
      - name: Tar wheelhouse
        run: tar -C wheels -cJf wheels-${{ matrix.platform }}.tar.xz .
      - name: Checksum
        run: sha256sum wheels-${{ matrix.platform }}.tar.xz > wheels-${{ matrix.platform }}.tar.xz.sha256
      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          REL="$(python3 -c 'import tomllib; print(tomllib.load(open("manifest.toml", "rb"))["release"])')"
          # Only the blessed tag uploads to a Release (mirrors
          # image.yml's IS_BLESSED gate). rc/hotfix tags must not fail
          # here: image.yml fails fast when this run concludes failure,
          # which would kill their DEV image build too.
          if [ "$TAG" != "v$REL" ]; then
              echo "non-blessed tag $TAG (manifest release is $REL); skipping Release upload"
              exit 0
          fi
          # A pushed tag is only a git ref — no GitHub Release object
          # exists until something creates it, and `gh release upload`
          # fails with "release not found" (broke v2026.7.0).
          gh release view "$TAG" >/dev/null 2>&1 || \
              gh release create "$TAG" --verify-tag \
                  --title "$REL" \
                  --notes-file "docs/releases/$REL.md"
          gh release upload "$TAG" \
              wheels-${{ matrix.platform }}.tar.xz \
              wheels-${{ matrix.platform }}.tar.xz.sha256 \
              --clobber
      - name: Archive as workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: wheels-${{ matrix.platform }}
          path: |
            wheels-${{ matrix.platform }}.tar.xz
            wheels-${{ matrix.platform }}.tar.xz.sha256
