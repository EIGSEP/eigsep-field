name: Release coordination
description: Cut a new blessed stack release.
title: "[release] "
labels: [release]
body:
  - type: input
    id: release
    attributes:
      label: Target release (calver)
      placeholder: "2026.05.0"
    validations: { required: true }
  - type: textarea
    id: changes
    attributes:
      label: Package version changes
      description: For each sibling, old → new. Leave unchanged ones out.
      placeholder: |
        eigsep_redis: 2.1.0 → 2.2.0
        picohost: 3.0.0 → 3.0.1
    validations: { required: true }
  - type: textarea
    id: firmware
    attributes:
      label: Firmware changes
      description: Pico .uf2 and/or RFSoC bitstream bumps.
  - type: checkboxes
    id: checklist
    attributes:
      label: Release checklist
      options:
        - label: Updated `manifest.toml` (versions, tags, released_at)
        - label: Wrote `docs/releases/<release>.md`
        - label: Ran `./scripts/refresh-lock.sh`
        - label: CI green on PR (lint, manifest, lock-drift, smoke, contract)
        - label: Release PR merged to `main`
        - label: Tag cut from the merge commit (`git tag -a vYYYY.MM.P -m "release YYYY.MM.P" && git push origin vYYYY.MM.P`)
        - label: Confirmed `IMAGE_FIRST_USER_PASS` repo secret is set (Settings → Secrets and variables → Actions); rotate if anyone has left the project since the last release
        - label: `wheelhouse.yml` + `image.yml` succeeded on the tag
        - label: Image verified in qemu / on a test Pi
        - label: PR against `EIGSEP/EIGSEP.github.io` bumping `docs/_data/eigsep_field.yml :: tag` to the new release tag
