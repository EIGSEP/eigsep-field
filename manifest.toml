# Blessed version tuple for one EIGSEP field release.
#
# This is the single source of truth. pyproject.toml's [project.version]
# and [project.dependencies] are injected from here at build time by
# scripts/hatch_manifest_hook.py. Do not edit those fields directly.
#
# After editing this file, run `./scripts/refresh-lock.sh` to regenerate
# uv.lock, requirements.txt, and requirements-hashed.txt.

release      = "2026.4.0"
python       = "3.11"
released_at  = "2026-04-21"
notes        = "docs/releases/2026.4.0.md"

# ---- Python packages (appear in wheelhouse + meta-package deps) ----

[packages.eigsep_redis]
pypi    = "eigsep_redis"
version = "2.1.0"
tag     = "v2.1.0"
source  = "https://github.com/EIGSEP/eigsep_redis"
# sha256 of the sdist on PyPI; populated by scripts/refresh-lock.sh
sha256  = ""

[packages.picohost]
pypi    = "picohost"
version = "3.0.0"
tag     = "v3.0.0"
source  = "https://github.com/EIGSEP/pico-firmware"
sha256  = ""

[packages.eigsep-vna]
pypi    = "eigsep-vna"
version = "1.3.0"
tag     = "v1.3.0"
source  = "https://github.com/EIGSEP/CMT-VNA"
sha256  = ""

[packages.eigsep_observing]
pypi    = "eigsep_observing"
version = "1.0.0"
tag     = "v1.0.0"
source  = "https://github.com/EIGSEP/eigsep_observing"
sha256  = ""

[packages.pyvalon]
pypi    = "pyvalon"
version = "0.1.0"
tag     = "v0.1.0"
source  = "https://github.com/EIGSEP/pyvalon"
sha256  = ""

# ---- Hardware-only Python packages (not on PyPI; built from git, shipped
# as pre-built aarch64 wheels in the wheelhouse). Installed out-of-band on
# Pi nodes via hardware-requirements.txt; NOT a dep of the eigsep-field
# meta package, because the ground stack lazy-imports them and non-Pi
# installs (CI, dev) should not pull them from git. ----

[hardware.casperfpga]
# SNAP board driver (CASPER collaboration). Our fork adds the I2C helpers
# needed for EIGSEP. eigsep_observing lazy-imports it (fpga.py, blocks.py)
# so only the ground computer requires it at runtime.
version = "0.6.0"
tag     = "v0.6.0"
source  = "https://github.com/EIGSEP/casperfpga"

# ---- Firmware artifacts (not pip-installable; checksummed blobs) ----

[firmware.pico]
# Flashed to the Raspberry Pi Pico(s) via picotool.
version = "v3.0.0"
asset   = "pico-firmware-v3.0.0.uf2"
source  = "https://github.com/EIGSEP/pico-firmware"
tag     = "v3.0.0"
sha256  = ""

[firmware.rfsoc_bitstream]
# Produced by a script in eigsep_dac; flashed to the RFSoC. eigsep_dac is
# not release-managed, so we pin by commit SHA. loader.py is vendored at
# this commit into firmware/rfsoc/loader.py.
version = "2026-04-01"
asset   = "eigsep_vivaldi_2026-04-01.npz"
source  = "https://github.com/EIGSEP/eigsep_dac"
commit  = ""
sha256  = ""

# ---- RPi image artifact (hashes are published as sidecar .sha256 in the
# Release because the image is built from this manifest — chicken-and-egg).

[image]
tag   = "v2026.4.0"
asset = "eigsep-field-2026.4.0.img.tar.xz"

# ---- Out-of-band pins (system packages baked into the image) ----

[system]
# Debian package version of redis-server installed by pi-gen. eigsep_redis
# is the code contract; this pins the server.
redis_server_apt = "7:7.0.15-1"
# Serves DHCP on the private LAN; exactly one Pi per LAN enables it (see
# [services.isc_dhcp]). Config lives out-of-band in the dhcp_config sibling
# repo.
isc_dhcp_server_apt = "4.4.3-P1-2"
# chrony disciplines time on every Pi; see [services.chrony]. The
# dhcp-master Pi is the LAN time server (uses the operator laptop at
# 10.10.10.2 as upstream when present); other Pis sync from the
# dhcp-master at 10.10.10.1. Per-role chrony.conf snippet is staged to
# /etc/eigsep/chrony/ and symlinked at first boot by _cmd_apply_role.
chrony_apt = "4.3-2+deb12u1"
# Target platform for the wheelhouse. Field deployment is Pi4 running
# 64-bit Raspberry Pi OS, so aarch64. (Pi4 also supports 32-bit armv7l
# but we're not using that variant.)
platform = "linux_aarch64"

# ---- Systemd services baked into the image ----
#
# The image is identical on every Pi. Per-Pi differentiation happens at
# enable time: activation="always" services are enabled at image build;
# activation="role" services are installed but only enabled by
# eigsep-first-boot.service when /boot/eigsep-role.conf picks the matching
# role.
#
# kind:
#   apt      — provided by an APT package; no unit file shipped here.
#   local    — unit file lives in files/systemd/ and is owned by this repo.
#   sibling  — unit file lives in files/systemd/ but the authority is a
#              sibling repo; tag + source_path pin the upstream for drift CI.

[services.redis]
kind       = "apt"
unit       = "redis-server.service"
activation = "always"

[services.chrony]
# Time sync. Every Pi runs chrony; the role-applier symlinks either
# server.conf (dhcp-master) or client.conf (others) into
# /etc/chrony/conf.d/eigsep.conf at first boot.
kind       = "apt"
unit       = "chrony.service"
activation = "always"

[services.isc_dhcp]
kind       = "apt"
unit       = "isc-dhcp-server.service"
activation = "role"
role       = "dhcp-master"

[services.picomanager]
kind        = "sibling"
unit        = "picomanager.service"
activation  = "role"
role        = "panda"
source      = "https://github.com/EIGSEP/pico-firmware"
# Must match [packages.picohost].tag — enforced by check-services-drift.
tag         = "v3.0.0"
source_path = "picohost/pico-manager.service"

[services.cmtvna]
kind        = "sibling"
unit        = "cmtvna.service"
activation  = "role"
role        = "panda"
source      = "https://github.com/EIGSEP/CMT-VNA"
# Must match [packages.eigsep-vna].tag — enforced by check-services-drift.
tag         = "v1.3.0"
source_path = "scripts/cmtvna.service"

[services.eigsep_panda]
kind       = "local"
unit       = "eigsep-panda.service"
activation = "role"
role       = "panda"

[services.eigsep_observer]
kind       = "local"
unit       = "eigsep-observer.service"
activation = "role"
role       = "backend"

[services.eigsep_panda_target]
kind       = "local"
unit       = "eigsep-panda.target"
activation = "role"
role       = "panda"

[services.eigsep_backend_target]
kind       = "local"
unit       = "eigsep-backend.target"
activation = "role"
role       = "backend"

[services.eigsep_dhcp_target]
kind       = "local"
unit       = "eigsep-dhcp.target"
activation = "role"
role       = "dhcp-master"

[services.eigsep_first_boot]
# Oneshot that runs on every boot until /boot/eigsep-role.conf has been
# applied; enables the role-matching services and self-disables.
kind       = "local"
unit       = "eigsep-first-boot.service"
activation = "always"
