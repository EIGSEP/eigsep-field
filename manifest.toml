# Blessed version tuple for one EIGSEP field release.
#
# This is the single source of truth. pyproject.toml's [project.version]
# and [project.dependencies] are injected from here at build time by
# scripts/hatch_manifest_hook.py. Do not edit those fields directly.
#
# After editing this file, run `./scripts/refresh-lock.sh` to regenerate
# uv.lock, requirements.txt, and requirements-hashed.txt.

release      = "2026.4.0"
python       = "3.11"
released_at  = "2026-04-21"
notes        = "docs/releases/2026.4.0.md"

# ---- Python packages (appear in wheelhouse + meta-package deps) ----

[packages.eigsep_redis]
pypi    = "eigsep_redis"
version = "2.1.0"
tag     = "v2.1.0"
source  = "https://github.com/EIGSEP/eigsep_redis"
# sha256 of the sdist on PyPI; populated by scripts/refresh-lock.sh
sha256  = ""

[packages.picohost]
pypi    = "picohost"
version = "3.0.0"
tag     = "v3.0.0"
source  = "https://github.com/EIGSEP/pico-firmware"
sha256  = ""

[packages.eigsep-vna]
pypi    = "eigsep-vna"
version = "1.3.0"
tag     = "v1.3.0"
source  = "https://github.com/EIGSEP/cmt_vna"
sha256  = ""

[packages.eigsep_observing]
pypi    = "eigsep_observing"
version = "1.0.0"
tag     = "v1.0.0"
source  = "https://github.com/EIGSEP/eigsep_observing"
sha256  = ""

[packages.pyvalon]
pypi    = "pyvalon"
version = "0.1.0"
tag     = "v0.1.0"
source  = "https://github.com/EIGSEP/pyvalon"
sha256  = ""

# ---- Hardware-only Python packages (not on PyPI; built from git, shipped
# as pre-built aarch64 wheels in the wheelhouse). Installed out-of-band on
# field nodes — the Pi (casperfpga, via install-field.sh) and the RFSoC
# (eigsep_dac, rsync'd from the Pi's wheelhouse by the operator). NOT a
# dep of the eigsep-field meta package, because the ground stack either
# lazy-imports them (casperfpga) or doesn't import them at all
# (eigsep_dac); CI/dev installs should not pull them from git. ----

[hardware.casperfpga]
# SNAP/RFSoC2x2 board driver (CASPER collaboration). Our fork adds the
# I2C helpers needed for EIGSEP. Required at runtime on both field
# nodes: the Pi lazy-imports it via eigsep_observing (fpga.py, blocks.py)
# to talk to the SNAP, and the RFSoC imports it via eigsep_dac
# (program_board.py) to program the DAC. Both callers lazy-import so dev
# installs don't need it.
version = "0.6.0"
tag     = "v0.6.0"
source  = "https://github.com/EIGSEP/casperfpga"

[hardware.eigsep_dac]
# RFSoC2x2 DAC programmer + pseudorandom waveform helpers. Runs on the
# RFSoC itself (aarch64, same wheel arch as the Pi) — not on the Pi's
# ground stack. The wheel is staged in the wheelhouse so a field operator
# can rsync it from the Pi to the RFSoC for install or hot-fix without
# internet. Must track the commit pinned in [firmware.rfsoc_bitstream];
# the host programmer code and the .npz are produced together.
#
# TODO: fill tag + sha256 once the eigsep_dac refactor PR merges and
# tags its first release (tracking EIGSEP/eigsep_dac#1). Until then this
# entry is a placeholder and `./scripts/refresh-lock.sh` will not be able
# to resolve it.
version = "0.1.0"
tag     = ""
source  = "https://github.com/EIGSEP/eigsep_dac"

# ---- Firmware artifacts (not pip-installable; checksummed blobs) ----

[firmware.pico]
# Flashed to the Raspberry Pi Pico(s) via picotool.
version = "v3.0.0"
asset   = "pico-firmware-v3.0.0.uf2"
source  = "https://github.com/EIGSEP/pico-firmware"
tag     = "v3.0.0"
sha256  = ""

[firmware.rfsoc_bitstream]
# Produced by a script in eigsep_dac; flashed to the RFSoC. The commit
# pinned here must match the tag in [hardware.eigsep_dac] — the host
# programmer code (the wheel) and the bitstream are produced together,
# and the programmer assumes the bitstream's npz schema.
version = "2026-04-01"
asset   = "eigsep_vivaldi_2026-04-01.npz"
source  = "https://github.com/EIGSEP/eigsep_dac"
commit  = ""
sha256  = ""

# ---- RPi image artifact (hashes are published as sidecar .sha256 in the
# Release because the image is built from this manifest — chicken-and-egg).

[image]
tag   = "v2026.4.0"
asset = "eigsep-field-2026.4.0.img.tar.xz"

# ---- Out-of-band pins (system packages baked into the image) ----

[system]
# Debian package version of redis-server installed by pi-gen. eigsep_redis
# is the code contract; this pins the server.
redis_server_apt = "7:7.0.15-1"
# Target platform for the wheelhouse. Field deployment is Pi4 running
# 64-bit Raspberry Pi OS, so aarch64. (Pi4 also supports 32-bit armv7l
# but we're not using that variant.)
platform = "linux_aarch64"
