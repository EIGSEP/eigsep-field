# Blessed version tuple for one EIGSEP field release.
#
# This is the single source of truth. pyproject.toml's [project.version]
# and [project.dependencies] are injected from here at build time by
# scripts/hatch_manifest_hook.py. Do not edit those fields directly.
#
# After editing this file, run `./scripts/refresh-lock.sh` to regenerate
# uv.lock, requirements.txt, and requirements-hashed.txt.

release      = "2026.4.0"
python       = "3.13"
released_at  = "2026-04-21"
notes        = "docs/releases/2026.4.0.md"

# ---- Python packages (appear in wheelhouse + meta-package deps) ----

[packages.eigsep_redis]
pypi    = "eigsep_redis"
version = "2.1.1"
tag     = "v2.1.1"
source  = "https://github.com/EIGSEP/eigsep_redis"
# sha256 of the sdist on PyPI; populated by scripts/refresh-lock.sh
sha256  = ""

[packages.picohost]
pypi    = "picohost"
version = "3.1.1"
tag     = "v3.1.1"
source  = "https://github.com/EIGSEP/pico-firmware"
sha256  = ""
# The pico-firmware repo carries both the Python wrapper (picohost/)
# and the C firmware source + build.sh. Clone the repo under its real
# name so `cd ~/src/pico-firmware && vim src/foo.c` matches operator
# muscle memory. `recursive_submodules` pulls pico-sdk + lib/cJSON
# at image-build time so build.sh can run offline in the field.
clone_path           = "pico-firmware"
recursive_submodules = true

[packages.eigsep-vna]
pypi    = "eigsep-vna"
version = "1.3.0"
tag     = "v1.3.0"
source  = "https://github.com/EIGSEP/CMT-VNA"
sha256  = ""

[packages.eigsep_observing]
pypi    = "eigsep_observing"
version = "2.1.0"
tag     = "v2.1.0"
source  = "https://github.com/EIGSEP/eigsep_observing"
sha256  = ""

[packages.pyvalon]
pypi    = "pyvalon"
version = "0.1.0"
tag     = "v0.1.0"
source  = "https://github.com/EIGSEP/pyvalon"
sha256  = ""

# ---- Hardware-only Python packages (not on PyPI; built from git, shipped
# as pre-built aarch64 wheels in the wheelhouse). Installed out-of-band on
# Pi nodes via hardware-requirements.txt; NOT a dep of the eigsep-field
# meta package, because the ground stack lazy-imports them and non-Pi
# installs (CI, dev) should not pull them from git. ----

[hardware.casperfpga]
# SNAP board driver (CASPER collaboration). Imported by
# eigsep-observe.service on the backend Pi to talk to the SNAP; not used
# by panda service code paths. The `roles` gate keeps
# `eigsep-field doctor` from flagging it missing on Pis that don't
# import it.
#
# 0.7.2 relaxes the stale `redis<7` install_requires cap that previously
# conflicted with the main resolve's `redis==7.4.0` and broke
# `pip install --require-hashes -r hardware-requirements.txt` in the
# image chroot. Drops `future<2` (never imported in source; still pulled
# transitively by katcp). See EIGSEP/casperfpga PR for the audit.
version = "0.7.2"
tag     = "v0.7.2"
source  = "https://github.com/EIGSEP/casperfpga"
roles   = ["backend"]

# ---- Field-debug Python packages (PyPI, not part of the runtime stack).
# Shipped in the wheelhouse via the `debug` extra so they're present on
# field Pis with no internet, but NOT pulled by `pip install eigsep-field`
# in CI/dev — that would bloat smoke runs and dev envs with REPL/plot
# tooling nobody needs there. Operators get them via
# `pip install eigsep-field[debug]` (or, in the field, automatically from
# the wheelhouse, which is built with --extra debug). ----

[debug.ipython]
# Interactive REPL for poking at a running stack at the field site.
pypi    = "ipython"
version = "9.13.0"

[debug.matplotlib]
# Already pulled in transitively today via eigsep-vna; pinning here is
# belt-and-suspenders so a future eigsep-vna release that drops the
# matplotlib dep doesn't silently strip plotting from the field image.
# Version must stay reconcilable with whatever eigsep-vna asks for.
pypi    = "matplotlib"
version = "3.10.9"

# ---- Field tooling (PyPI, runtime deps of the eigsep-field meta package).
# Distinct from [debug.*] because these are required for the field
# workflow itself (`eigsep-field revert` shells out to `uv sync`), not
# optional REPL/plot extras. The hatch hook injects [tooling.*] into the
# meta package's main `dependencies`, so `pip install eigsep-field` (no
# extras) pulls them on every install — CI, dev, and field. ----

[tooling.uv]
# Required by `eigsep-field patch` / `eigsep-field revert` for editable
# installs and offline `uv sync` against /opt/eigsep/wheels. The PyPI
# `uv` package vendors the static binary, so it lands at
# /opt/eigsep/venv/bin/uv with no extra build steps.
pypi    = "uv"
version = "0.10.4"

# ---- Firmware artifacts (not pip-installable; checksummed blobs) ----

[firmware.pico]
# Flashed to the Raspberry Pi Pico(s) via picotool. Asset name matches
# upstream's build output (`build/pico_multi.uf2` from build.sh) — see
# pico-firmware's release-please.yml job that attaches it to the tagged
# Release. Stable across releases; provenance is enforced by sha256 below.
# Loaded by picomanager.service which only runs on the panda Pi.
version = "v3.1.1"
asset   = "pico_multi.uf2"
source  = "https://github.com/EIGSEP/pico-firmware"
tag     = "v3.1.1"
sha256  = ""
roles   = ["panda"]

[firmware.pico.build]
# In-field rebuild target for `eigsep-field patch pico-firmware`. The
# operator-visible name is the src_path (matches the repo name and the
# clone destination from [packages.picohost].clone_path). The blessed
# UF2 above is never overwritten — a field build lands at
# /opt/eigsep/src/<src_path>/<artifact> and a systemd drop-in retargets
# the service's --uf2 flag at it, so the path itself signals "this is
# not blessed". `eigsep-field revert pico-firmware` drops the override
# and flash-picos's the blessed UF2 back.
src_path = "pico-firmware"
script   = "build.sh"
artifact = "build/pico_multi.uf2"
service  = "picomanager.service"

[firmware.rfsoc_bitstream]
# Produced by a script in eigsep_dac; flashed to the RFSoC. eigsep_dac is
# not release-managed, so we pin by commit SHA. loader.py is vendored at
# this commit into firmware/rfsoc/loader.py. The .npz lives on the
# backend Pi at /opt/eigsep/firmware/rfsoc/ where eigsep-observe.service
# loads it via casperfpga; panda never reads it.
version = "2026-04-01"
asset   = "eigsep_vivaldi_2026-04-01.npz"
source  = "https://github.com/EIGSEP/eigsep_dac"
commit  = ""
sha256  = ""
roles   = ["backend"]

# ---- External binaries (proprietary, operator-installed) ----
#
# [external.*] entries describe userspace binaries we cannot redistribute
# (proprietary vendor licenses) and that an operator installs once per Pi
# from the vendor's CDN. The image build pre-creates `install_path` with
# eigsep:eigsep ownership; the operator runs scripts/install-cmtvna.sh
# (or the per-binary helper) to stage the unpacked tree. doctor checks
# presence on the listed roles and tells the operator how to install.
# Distinct from [firmware.*], which is for blobs we *do* redistribute.

[external.cmtvna]
# CMT R60 VNA driver — proprietary, ships out-of-band from CMT (we cannot
# mirror it under an MIT-licensed public repo). The panda Pi's
# cmtvna.service ExecStarts /opt/eigsep/cmt-vna/bin/cmtvna in
# socket-server mode; without it the service crash-loops. The python
# wrapper `eigsep-vna` ([packages.eigsep-vna]) is independent — these
# two versions track separately. sha256 stays empty until first
# hand-validation pins it; CMT may rev the URL silently.
version      = "1.7.1"
url          = "https://coppermountaintech.com/wp-content/uploads/2026/05/cmtvna-1.7.1-linux-aarch64.tar.gz.zip"
sha256       = ""
install_path = "/opt/eigsep/cmt-vna"
binary       = "bin/cmtvna"
roles        = ["panda"]

# ---- Out-of-band pins (system packages baked into the image) ----

[system]
# Debian package version of redis-server installed by pi-gen. eigsep_redis
# is the code contract; this pins the server.
redis_server_apt = "5:8.0.2-3+deb13u1"
# Serves DHCP on the private LAN; exactly one Pi per LAN enables it (see
# [services.isc_dhcp]). Config is baked into the image from
# image/pi-gen-config/stage-eigsep/files/dhcp/.
isc_dhcp_server_apt = "4.4.3-P1-8"
# chrony disciplines time on every Pi; see [services.chrony]. The
# backend Pi is the LAN time server (uses the operator laptop at
# 10.10.10.17 as upstream when present); other Pis sync from the
# backend at 10.10.10.10. Per-role chrony.conf snippet is staged to
# /etc/eigsep/chrony/ and symlinked at first boot by _cmd_apply_role.
chrony_apt = "4.6.1-3+deb13u1"
# Target platform for the wheelhouse. Field deployment is 64-bit
# Raspberry Pi OS on a mixed Pi 4 (panda) / Pi 5 (backend) fleet; both
# are aarch64, so a single wheelhouse serves both.
platform = "linux_aarch64"

# ---- Systemd services baked into the image ----
#
# The image is identical on every Pi. Per-Pi differentiation happens at
# enable time: activation="always" services are enabled at image build;
# activation="role" services are installed but only enabled by
# eigsep-first-boot.service when /boot/firmware/eigsep-role.conf picks
# the matching role.
#
# kind:
#   apt      — provided by an APT package; no unit file shipped here.
#   local    — unit file lives in files/systemd/ and is owned by this repo.
#   sibling  — unit file lives in files/systemd/ but the authority is a
#              sibling repo; tag + source_path pin the upstream for drift CI.

[services.redis]
kind       = "apt"
unit       = "redis-server.service"
activation = "always"

[services.chrony]
# Time sync. Every Pi runs chrony; the role-applier symlinks either
# server.conf (backend) or client.conf (others) into
# /etc/chrony/conf.d/eigsep.conf at first boot.
kind       = "apt"
unit       = "chrony.service"
activation = "always"

[services.isc_dhcp]
kind       = "apt"
unit       = "isc-dhcp-server.service"
activation = "role"
role       = "backend"

[services.picomanager]
kind        = "sibling"
unit        = "picomanager.service"
activation  = "role"
role        = "panda"
source      = "https://github.com/EIGSEP/pico-firmware"
# Must match [packages.picohost].tag — enforced by check-services-drift.
tag         = "v3.1.1"
source_path = "picohost/pico-manager.service"

[services.cmtvna]
kind        = "sibling"
unit        = "cmtvna.service"
activation  = "role"
role        = "panda"
source      = "https://github.com/EIGSEP/CMT-VNA"
# Must match [packages.eigsep-vna].tag — enforced by check-services-drift.
tag         = "v1.3.0"
source_path = "scripts/cmtvna.service"

[services.eigsep_panda]
kind       = "local"
unit       = "eigsep-panda.service"
activation = "role"
role       = "panda"

[services.eigsep_observe]
# SNAP supervisor: wraps fpga_init.py --reinit -p with Restart=on-failure
# so casperfpga register-read timeouts (SNAP rebooted, bitstream gone)
# self-heal during overnight thermal cycling. See README in the source
# repo for the rationale behind unbounded retries.
kind        = "sibling"
unit        = "eigsep-observe.service"
activation  = "role"
role        = "backend"
source      = "https://github.com/EIGSEP/eigsep_observing"
# Must match [packages.eigsep_observing].tag — enforced by check-services-drift.
tag         = "v2.1.0"
source_path = "deploy/systemd/eigsep-observe.service"

[services.eigsep_observe_writer]
# Corr-data file writer: wraps observe.py. Restarted on genuine crashes
# (segfault/OOM/unhandled thread exception) — SNAP-side producer silence
# is now log-only; recovery is the eigsep-observe.service supervisor's job.
kind        = "sibling"
unit        = "eigsep-observe-writer.service"
activation  = "role"
role        = "backend"
source      = "https://github.com/EIGSEP/eigsep_observing"
# Must match [packages.eigsep_observing].tag — enforced by check-services-drift.
tag         = "v2.1.0"
source_path = "deploy/systemd/eigsep-observe-writer.service"

[services.eigsep_panda_target]
kind       = "local"
unit       = "eigsep-panda.target"
activation = "role"
role       = "panda"

[services.eigsep_backend_target]
kind       = "local"
unit       = "eigsep-backend.target"
activation = "role"
role       = "backend"

[services.eigsep_first_boot]
# Oneshot that runs on every boot until /boot/firmware/eigsep-role.conf
# (or legacy /boot/eigsep-role.conf) has been applied; enables the role-
# matching services and self-disables.
kind       = "local"
unit       = "eigsep-first-boot.service"
activation = "always"
